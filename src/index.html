<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Calendar</title>
    <meta name="description" content="Local habit accountability calendar for coding practice tracking">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/dayview.css">
    <link rel="stylesheet" href="css/setup.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/devices.css">
</head>
<body>
    <!-- Setup Wizard (shown only on first run) -->
    <div id="setup-overlay" class="setup-overlay hidden">
        <div class="setup-modal">
            <div class="setup-steps" id="setup-steps"></div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="app-title">Calendar</h1>
            </div>

            <!-- Mini Calendar -->
            <div class="mini-calendar" id="mini-calendar"></div>

            <!-- Navigation -->
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-view="month" id="nav-month">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <span>Month</span>
                </button>
                <button class="nav-btn" data-view="week" id="nav-week">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="10" x2="9" y2="22"/><line x1="15" y1="10" x2="15" y2="22"/></svg>
                    <span>Week</span>
                </button>
                <button class="nav-btn" data-view="year" id="nav-year">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="3" y1="16" x2="21" y2="16"/><line x1="9" y1="4" x2="9" y2="22"/><line x1="15" y1="4" x2="15" y2="22"/></svg>
                    <span>Year</span>
                </button>
            </nav>

            <div class="sidebar-spacer"></div>

            <!-- Bottom actions -->
            <div class="sidebar-footer">
                <button class="icon-btn" id="btn-devices" title="Connect Devices">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
                </button>
                <button class="icon-btn" id="btn-dashboard" title="Dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
                </button>
                <button class="icon-btn" id="btn-settings" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Calendar Header -->
            <header class="calendar-header" id="calendar-header">
                <div class="header-left">
                    <h2 class="current-month" id="current-month-label"></h2>
                    <button class="today-btn" id="btn-today">Today</button>
                </div>
                <div class="header-right">
                    <button class="nav-arrow" id="btn-prev" aria-label="Previous">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <button class="nav-arrow" id="btn-next" aria-label="Next">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
            </header>

            <!-- Calendar Grid -->
            <div class="calendar-view" id="calendar-view">
                <!-- Day headers -->
                <div class="weekday-headers" id="weekday-headers">
                    <div class="weekday-header">Sun</div>
                    <div class="weekday-header">Mon</div>
                    <div class="weekday-header">Tue</div>
                    <div class="weekday-header">Wed</div>
                    <div class="weekday-header">Thu</div>
                    <div class="weekday-header">Fri</div>
                    <div class="weekday-header">Sat</div>
                </div>
                <!-- Calendar grid filled by JS -->
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>

            <!-- Year View (hidden by default) -->
            <div class="year-view hidden" id="year-view"></div>
        </main>

        <!-- Day Detail Panel -->
        <aside class="day-panel hidden" id="day-panel">
            <div class="panel-header">
                <h3 id="panel-date"></h3>
                <button class="panel-close" id="panel-close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="panel-content" id="panel-content"></div>
        </aside>
    </div>

    <!-- Dashboard Overlay -->
    <div class="dashboard-overlay hidden" id="dashboard-overlay">
        <div class="dashboard-modal">
            <div class="dashboard-header">
                <h2>Dashboard</h2>
                <button class="panel-close" id="dashboard-close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="dashboard-content" id="dashboard-content"></div>
        </div>
    </div>

    <!-- Settings Overlay -->
    <div class="settings-overlay hidden" id="settings-overlay">
        <div class="settings-modal">
            <div class="settings-header">
                <h2>Settings</h2>
                <button class="panel-close" id="settings-close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="settings-content" id="settings-content"></div>
        </div>
    </div>

    <!-- Devices Overlay -->
    <div class="devices-overlay hidden" id="devices-overlay">
        <div class="devices-modal">
            <div class="devices-header">
                <h2>Connect Devices</h2>
                <button class="panel-close" id="devices-close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="devices-content" id="devices-content"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/dayview.js"></script>
    <script src="js/setup.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/devices.js"></script>
</body>
</html>
