name: 'Release Apps'

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Habit Calendar v__VERSION__'
          releaseBody: |
            ## 🚀 How to Install

            ### 🍎 macOS (Recommended — Homebrew)
            ```bash
            brew install --cask trijalkhade/tap/habit-calendar
            ```
            This automatically downloads, installs, and removes Gatekeeper restrictions.

            **Or use the install script:**
            ```bash
            curl -sSL https://raw.githubusercontent.com/Trijalkhade/habit-calendar/main/install.sh | bash
            ```

            ### 🪟 Windows
            Open **PowerShell** and run:
            ```powershell
            iwr -useb https://raw.githubusercontent.com/Trijalkhade/habit-calendar/main/install.ps1 | iex
            ```

            ### 🐧 Linux
            Download the `.deb` or `.AppImage` file below.

            ---

            ### ⚠️ Manual Download Note
            If you download the files below directly, your OS may show a security warning because the app is not yet code-signed.
            - **macOS**: Right-click the app → Open → Open, or run `xattr -cr "/Applications/Habit Calendar.app"` in Terminal.
            - **Windows**: Click **More info** → **Run anyway**.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}

