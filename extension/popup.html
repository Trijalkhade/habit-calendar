<!DOCTYPE html>
<html>
<head>
    <title>Sync Settings</title>
    <style>
        body { width: 250px; font-family: -apple-system, system-ui, sans-serif; padding: 16px; margin: 0; background: #fff; color: #333; }
        h3 { margin-top: 0; font-size: 14px; margin-bottom: 12px; }
        input { width: 100%; box-sizing: border-box; padding: 6px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 8px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .status { margin-top: 10px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <h3>Habit Calendar Sync</h3>
    <label style="font-size: 12px; display: block; margin-bottom: 4px;">Desktop IP Address (optional):</label>
    <input type="text" id="ipAddress" placeholder="e.g. 192.168.1.100">
    <button id="saveBtn">Save & Sync</button>
    <div id="status" class="status"></div>
    <script src="popup.js"></script>
</body>
</html>
